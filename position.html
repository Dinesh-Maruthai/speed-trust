<body>
    <div class="parent" style="
        height: 500px; 
        width: 500px; 
        background-color: coral;
        position: relative;
        ">
        this is parent


        <div class="child" style="
    height: 100px;
    width: 100px;
    background-color: black;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    ">
        this is children

    </div>
    </div>
